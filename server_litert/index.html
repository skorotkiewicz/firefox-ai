<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Chat (Local)</title>
  <style>
    :root { color-scheme: dark; --bg: #0a0a0a; --panel: #171717; --panel-2: #262626; --panel-3: #404040; --text: #ededed; --muted: #a3a3a3; --border: #262626; --user: #404040; --assistant: #171717; --accent: #525252; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: Arial, Helvetica, sans-serif; }
    .app { height: 100vh; display: flex; flex-direction: column; }
    .header, .composer { display: flex; align-items: center; padding: 12px 16px; border-color: var(--border); background: var(--panel); }
    .header { justify-content: space-between; border-bottom: 1px solid var(--border); }
    .composer { gap: 8px; border-top: 1px solid var(--border); }
    h2 { margin: 0; font-size: 1.125rem; }
    button { border: 0; cursor: pointer; font: inherit; padding: 8px 16px; border-radius: 8px; background: var(--accent); color: #fff; }
    button:disabled { opacity: 0.5; }
    #imageBtn, #audioBtn { background: var(--panel-3); padding: 8px 12px; font-size: 1.25rem; }
    #imageBtn:hover, #audioBtn:hover { background: var(--panel-2); }
    .messages { flex: 1; overflow-y: auto; padding: 16px; }
    .message-row { display: flex; margin-bottom: 16px; }
    .message-row.user { justify-content: flex-end; }
    .bubble { max-width: 80%; border-radius: 12px; padding: 10px 16px; font-size: 0.875rem; line-height: 1.5; }
    .bubble.user { background: var(--user); color: #fff; white-space: pre-wrap; }
    .bubble.assistant { background: var(--assistant); }
    textarea { flex: 1; min-height: 44px; resize: none; padding: 10px; border: 1px solid var(--panel-3); border-radius: 10px; background: var(--panel-2); color: var(--text); }
  </style>
</head>
<body>
    <div class="app">
    <div class="header">
      <h2>Chat (Local)</h2>
      <button id="clearBtn">Clear</button>
    </div>
    <div id="messages" class="messages"></div>
    <div id="mediaPreview" style="display: none; padding: 8px 16px; background: var(--panel-2);">
      <span id="previewText"></span>
      <button id="clearMedia" style="margin-left: 8px; padding: 4px 8px; font-size: 0.75rem;">✕</button>
    </div>
    <form id="chatForm" class="composer">
      <textarea id="input" rows="3" placeholder="Type message..."></textarea>
      <input type="file" id="imageInput" accept="image/*" style="display: none;">
      <input type="file" id="audioInput" accept="audio/*" style="display: none;">
      <button type="button" id="imageBtn" title="Upload image">📷</button>
      <button type="button" id="audioBtn" title="Upload audio">🎤</button>
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>
  <script>
    const messages = [];
    let currentAudio = null;
    let currentImage = null;
    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("input");
    const form = document.getElementById("chatForm");
    const imageInput = document.getElementById("imageInput");
    const audioInput = document.getElementById("audioInput");
    const mediaPreview = document.getElementById("mediaPreview");
    const previewText = document.getElementById("previewText");
    
    function updatePreview() {
      if (currentAudio && currentImage) {
        previewText.textContent = "📷 Image + 🎤 Audio ready";
        mediaPreview.style.display = "block";
      } else if (currentImage) {
        previewText.textContent = "📷 Image ready: " + currentImage.name;
        mediaPreview.style.display = "block";
      } else if (currentAudio) {
        previewText.textContent = "🎤 Audio ready: " + currentAudio.name;
        mediaPreview.style.display = "block";
      } else {
        mediaPreview.style.display = "none";
      }
    }
    
    document.getElementById("imageBtn").addEventListener("click", () => imageInput.click());
    document.getElementById("audioBtn").addEventListener("click", () => audioInput.click());
    
    imageInput.addEventListener("change", (e) => {
      if (e.target.files[0]) {
        currentImage = e.target.files[0];
        updatePreview();
      }
    });
    
    audioInput.addEventListener("change", (e) => {
      if (e.target.files[0]) {
        currentAudio = e.target.files[0];
        updatePreview();
      }
    });
    
    document.getElementById("clearMedia").addEventListener("click", () => {
      currentAudio = null;
      currentImage = null;
      imageInput.value = "";
      audioInput.value = "";
      updatePreview();
    });
    
    function addMessage(role, content, hasImage, hasAudio) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;
      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;
      let displayContent = content;
      if (hasImage) displayContent = "📷 " + displayContent;
      if (hasAudio) displayContent = "🎤 " + displayContent;
      bubble.textContent = displayContent;
      row.appendChild(bubble);
      messagesDiv.appendChild(row);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text && !currentAudio && !currentImage) return;
      
      const displayText = text || (currentAudio && currentImage ? "Audio + Image" : currentAudio ? "Audio message" : "Image");
      addMessage("user", displayText, !!currentImage, !!currentAudio);
      messages.push({ role: "user", content: displayText });
      input.value = "";
      input.disabled = true;
      document.getElementById("sendBtn").disabled = true;
      
      const assistantRow = document.createElement("div");
      assistantRow.className = "message-row assistant";
      const assistantBubble = document.createElement("div");
      assistantBubble.className = "bubble assistant";
      assistantRow.appendChild(assistantBubble);
      messagesDiv.appendChild(assistantRow);
      
      // Build form data with files
      const formData = new FormData();
      formData.append("messages", JSON.stringify([...messages]));
      if (currentAudio) formData.append("audio", currentAudio);
      if (currentImage) formData.append("image", currentImage);
      
      // Clear media after sending
      currentAudio = null;
      currentImage = null;
      imageInput.value = "";
      audioInput.value = "";
      updatePreview();
      
      const response = await fetch("/api/chat", {
        method: "POST",
        body: formData,
      });
      
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        fullText += decoder.decode(value, { stream: true });
        assistantBubble.textContent = fullText;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
      messages.push({ role: "assistant", content: fullText });
      input.disabled = false;
      document.getElementById("sendBtn").disabled = false;
      input.focus();
    });
    
    document.getElementById("clearBtn").addEventListener("click", () => {
      messages.length = 0;
      messagesDiv.innerHTML = "";
      currentAudio = null;
      currentImage = null;
      imageInput.value = "";
      audioInput.value = "";
      updatePreview();
    });
  </script>
</body>
</html>
