<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Chat (Local)</title>
  <meta name="description" content="Chat with local AI - litert_lm powered">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --panel: #171717;
      --panel-2: #262626;
      --panel-3: #404040;
      --text: #ededed;
      --muted: #a3a3a3;
      --border: #262626;
      --user: #404040;
      --assistant: #171717;
      --danger: #7f1d1d;
      --danger-hover: #991b1b;
      --accent: #525252;
      --accent-hover: #737373;
      --link: #d4d4d4;
      --code-inline-bg: #262626;
      --code-inline-text: #d4d4d4;
      --blockquote: #525252;
    }

    body.light {
      color-scheme: light;
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-2: #f3f4f6;
      --panel-3: #e5e7eb;
      --text: #111827;
      --muted: #9ca3af;
      --border: #e5e7eb;
      --user: #2563eb;
      --assistant: #f3f4f6;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --link: #1d4ed8;
      --code-inline-bg: #f3f4f6;
      --code-inline-text: #1e40af;
      --blockquote: #d1d5db;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header, .composer {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-color: var(--border);
      background: var(--panel);
    }

    .header {
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .composer {
      gap: 8px;
      align-items: flex-end;
      border-top: 1px solid var(--border);
    }

    h2 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .toggle-btn, .send-btn, .stop-btn, .media-btn {
      color: #fff;
      border-radius: 8px;
      padding: 0 16px;
      height: 44px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background-color 0.15s ease, opacity 0.15s ease;
    }

    .toggle-btn {
      height: auto;
      padding: 6px 12px;
      background: var(--panel-2);
      color: var(--text);
    }

    .toggle-btn:hover { background: var(--panel-3); }
    .send-btn { background: var(--accent); }
    .send-btn:hover { background: var(--accent-hover); }
    .stop-btn { background: var(--danger); }
    .stop-btn:hover { background: var(--danger-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .media-btn {
      background: var(--panel-3);
      padding: 0 12px;
      font-size: 1.25rem;
    }
    .media-btn:hover { background: var(--panel-2); }
    .media-btn.active { background: var(--accent); }

    .clear-btn {
      background: transparent;
      color: var(--muted);
      font-size: 0.875rem;
      padding: 0;
    }

    .clear-btn:hover { color: var(--text); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: var(--muted);
      text-align: center;
    }

    .message-row {
      display: flex;
      margin-bottom: 16px;
    }

    .message-row.user { justify-content: flex-end; }
    .message-row.assistant { justify-content: flex-start; }
    .message-row.error { justify-content: center; }

    .bubble {
      max-width: 80%;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.875rem;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .bubble.user {
      background: var(--user);
      color: #fff;
      white-space: pre-wrap;
    }

    .bubble.assistant {
      background: var(--assistant);
      color: var(--text);
    }

    .bubble.error {
      background: var(--danger);
      color: #fee2e2;
    }

    .assistant-content p { margin: 0 0 1rem; }
    .assistant-content p:last-child { margin-bottom: 0; }
    .assistant-content a {
      color: var(--link);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .assistant-content strong { font-weight: 600; }
    .assistant-content blockquote {
      margin: 1rem 0;
      padding-left: 1rem;
      border-left: 4px solid var(--blockquote);
      font-style: italic;
    }
    .assistant-content ul,
    .assistant-content ol {
      margin: 1rem 0;
      padding-left: 1.25rem;
    }
    .assistant-content li { margin: 0.5rem 0; }
    .assistant-content code {
      background: var(--code-inline-bg);
      color: var(--code-inline-text);
      border-radius: 6px;
      padding: 2px 6px;
      font-family: "Geist Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 0.875em;
    }
    .assistant-content pre {
      margin: 0 0 1rem;
      padding: 1rem;
      overflow-x: auto;
      border-radius: 10px;
      background: #282c34;
      color: #abb2bf;
    }
    .assistant-content pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      border-radius: 0;
      font-size: 0.95em;
    }
    .assistant-content h1,
    .assistant-content h2,
    .assistant-content h3 {
      margin: 1rem 0 0.75rem;
      line-height: 1.25;
    }
    .assistant-content h1 { font-size: 1.5rem; }
    .assistant-content h2 { font-size: 1.25rem; }
    .assistant-content h3 { font-size: 1.125rem; }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--muted);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.55; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    #mediaPreview {
      display: none;
      padding: 8px 16px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
      color: var(--muted);
    }

    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 128px;
      resize: none;
      padding: 10px 16px;
      border: 1px solid var(--panel-3);
      border-radius: 10px;
      outline: none;
      font: inherit;
      font-size: 0.875rem;
      color: var(--text);
      background: var(--panel-2);
    }

    textarea::placeholder { color: var(--muted); }
    textarea:focus { box-shadow: 0 0 0 2px var(--panel-3); }
    textarea:disabled { opacity: 0.8; }

    @media (max-width: 640px) {
      .bubble { max-width: 92%; }
      .composer { padding: 12px; }
      .messages { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h2>Chat (Local)</h2>
      <div class="header-actions">
        <button id="themeToggle" class="toggle-btn" type="button">☀️</button>
        <button id="clearChat" class="clear-btn" type="button" hidden>Clear</button>
      </div>
    </div>

    <div id="mediaPreview"></div>

    <div id="messages" class="messages"></div>

    <form id="chatForm" class="composer">
      <textarea
        id="input"
        rows="3"
        placeholder="Type message... (Shift+Enter for new line)"
      ></textarea>
      <input type="file" id="imageInput" accept="image/*" style="display: none;">
      <input type="file" id="audioInput" accept="audio/*" style="display: none;">
      <button type="button" id="imageBtn" class="media-btn" title="Upload image">📷</button>
      <button type="button" id="audioBtn" class="media-btn" title="Upload audio">🎤</button>
      <button id="sendBtn" class="send-btn" type="submit">Send</button>
      <button id="stopBtn" class="stop-btn" type="button" hidden>Stop</button>
    </form>
  </div>

  <script>
    const state = {
      input: "",
      darkMode: true,
      messages: [],
      error: "",
      status: "idle",
      controller: null,
      currentImage: null,
      currentAudio: null,
    };

    const els = {
      body: document.body,
      messages: document.getElementById("messages"),
      form: document.getElementById("chatForm"),
      input: document.getElementById("input"),
      sendBtn: document.getElementById("sendBtn"),
      stopBtn: document.getElementById("stopBtn"),
      clearBtn: document.getElementById("clearChat"),
      themeToggle: document.getElementById("themeToggle"),
      imageBtn: document.getElementById("imageBtn"),
      audioBtn: document.getElementById("audioBtn"),
      imageInput: document.getElementById("imageInput"),
      audioInput: document.getElementById("audioInput"),
      mediaPreview: document.getElementById("mediaPreview"),
    };

    const escapeHtml = (value) =>
      value.replace(/[&<>"]/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
      }[char]));

    function renderMarkdown(text) {
      let safe = escapeHtml(text);

      safe = safe.replace(/```([\w-]+)?\n([\s\S]*?)```/g, (_, lang, code) => {
        const cls = lang ? ` class="language-${lang}"` : "";
        return `<pre><code${cls}>${code.trimEnd()}</code></pre>`;
      });

      safe = safe.replace(/^### (.+)$/gm, "<h3>$1</h3>");
      safe = safe.replace(/^## (.+)$/gm, "<h2>$1</h2>");
      safe = safe.replace(/^# (.+)$/gm, "<h1>$1</h1>");
      safe = safe.replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>");
      safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      safe = safe.replace(/`([^`]+)`/g, "<code>$1</code>");
      safe = safe.replace(/\[(.+?)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

      safe = safe.replace(/^(\d+)\. (.+)$/gm, "<li>$2</li>");
      safe = safe.replace(/^(?:- |\* )(.+)$/gm, "<li>$1</li>");
      safe = safe.replace(/(?:<li>.*<\/li>\n?)+/g, (match) => {
        const hasOrdered = /^<li>/.test(match) && /^\d+\. /m.test(text);
        return `${hasOrdered ? "<ol>" : "<ul>"}${match}${hasOrdered ? "</ol>" : "</ul>"}`;
      });

      const blocks = safe
        .split(/\n{2,}/)
        .map((block) => {
          if (/^<(h\d|ul|ol|li|pre|blockquote)/.test(block)) {
            return block;
          }
          return `<p>${block.replace(/\n/g, "<br>")}</p>`;
        })
        .join("");

      return blocks;
    }

    function updateMediaPreview() {
      const { currentImage, currentAudio } = state;
      if (currentImage && currentAudio) {
        els.mediaPreview.textContent = "📷 Image + 🎤 Audio ready";
        els.mediaPreview.style.display = "block";
      } else if (currentImage) {
        els.mediaPreview.textContent = `📷 ${currentImage.name}`;
        els.mediaPreview.style.display = "block";
      } else if (currentAudio) {
        els.mediaPreview.textContent = `🎤 ${currentAudio.name}`;
        els.mediaPreview.style.display = "block";
      } else {
        els.mediaPreview.style.display = "none";
      }
      
      els.imageBtn.classList.toggle("active", !!currentImage);
      els.audioBtn.classList.toggle("active", !!currentAudio);
    }

    function render() {
      els.body.classList.toggle("light", !state.darkMode);
      els.themeToggle.textContent = state.darkMode ? "☀️" : "🌙";
      els.input.value = state.input;
      els.input.disabled = state.status === "streaming";
      els.sendBtn.hidden = state.status === "streaming";
      els.stopBtn.hidden = state.status !== "streaming";
      els.sendBtn.disabled = !state.input.trim() && !state.currentImage && !state.currentAudio;
      els.clearBtn.hidden = state.messages.length === 0;

      updateMediaPreview();

      if (state.messages.length === 0 && !state.error && state.status !== "submitted" && state.status !== "streaming") {
        els.messages.innerHTML = `
          <div class="empty">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Chat icon" style="width: 48px; height: 48px; margin-bottom: 12px;">
              <title>Chat</title>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
            <p>Start a conversation</p>
          </div>
        `;
        return;
      }

      const rows = state.messages.map((message) => {
        if (message.role === "user") {
          let content = message.content;
          if (message.hasImage) content = "📷 " + content;
          if (message.hasAudio) content = "🎤 " + content;
          return `
            <div class="message-row user">
              <div class="bubble user">${escapeHtml(content).replace(/\n/g, "<br>")}</div>
            </div>
          `;
        }

        return `
            <div class="message-row assistant">
              <div class="bubble assistant">
              <div class="assistant-content">${renderMarkdown(message.content)}</div>
              </div>
            </div>
          `;
      }).join("");

      const errorRow = state.error ? `
        <div class="message-row error">
          <div class="bubble error">${escapeHtml(state.error)}</div>
        </div>
      ` : "";

      const typingRow = state.status === "submitted" ? `
        <div class="message-row assistant">
          <div class="bubble assistant">
            <div class="typing">
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
            </div>
          </div>
        </div>
      ` : "";

      els.messages.innerHTML = rows + errorRow + typingRow;
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function resizeTextarea() {
      els.input.style.height = "auto";
      els.input.style.height = `${Math.min(els.input.scrollHeight, 128)}px`;
    }

    function resetInputFocus() {
      if (state.status !== "submitted") {
        els.input.focus();
      }
    }

    async function sendMessage(text) {
      const trimmed = text.trim();
      if (!trimmed && !state.currentImage && !state.currentAudio) {
        return;
      }

      const generateId = () => Math.random().toString(36).substring(2, 15);
      
      state.error = "";
      state.messages.push({
        id: generateId(),
        role: "user",
        content: trimmed || (state.currentImage && state.currentAudio ? "Image + Audio" : state.currentImage ? "Image" : "Audio"),
        hasImage: !!state.currentImage,
        hasAudio: !!state.currentAudio,
      });
      state.messages.push({
        id: generateId(),
        role: "assistant",
        content: "",
      });
      state.input = "";
      state.status = "submitted";
      render();
      resizeTextarea();

      const controller = new AbortController();
      state.controller = controller;

      try {
        const formData = new FormData();
        formData.append("messages", JSON.stringify(
          state.messages
            .filter((m, i) => !(i === state.messages.length - 1 && m.role === "assistant" && m.content === ""))
            .map(({ role, content }) => ({ role, content }))
        ));
        if (state.currentAudio) formData.append("audio", state.currentAudio);
        if (state.currentImage) formData.append("image", state.currentImage);

        // Clear media after preparing form
        state.currentAudio = null;
        state.currentImage = null;
        els.imageInput.value = "";
        els.audioInput.value = "";

        const response = await fetch("/api/chat", {
          method: "POST",
          body: formData,
          signal: controller.signal,
        });

        if (!response.ok || !response.body) {
          let message = "An unexpected error occurred. Please try again later.";
          try {
            const data = await response.json();
            message = data.error || message;
          } catch (_) {}
          throw new Error(message);
        }

        state.status = "streaming";
        render();

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        const assistant = state.messages[state.messages.length - 1];

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          assistant.content += decoder.decode(value, { stream: true });
          render();
        }

        assistant.content += decoder.decode();
      } catch (err) {
        if (err.name !== "AbortError") {
          state.error = err.message || "An unexpected error occurred. Please try again later.";
        }
      } finally {
        state.controller = null;
        state.status = "idle";

        const last = state.messages[state.messages.length - 1];
        if (last && last.role === "assistant" && !last.content && state.error) {
          state.messages.pop();
        }

        render();
        resetInputFocus();
      }
    }

    els.form.addEventListener("submit", (event) => {
      event.preventDefault();
      sendMessage(state.input);
    });

    els.input.addEventListener("input", (event) => {
      state.input = event.target.value;
      resizeTextarea();
      render();
    });

    els.input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage(state.input);
      }
    });

    els.stopBtn.addEventListener("click", () => {
      state.controller?.abort();
    });

    els.clearBtn.addEventListener("click", () => {
      state.messages = [];
      state.error = "";
      state.input = "";
      state.currentImage = null;
      state.currentAudio = null;
      els.imageInput.value = "";
      els.audioInput.value = "";
      render();
      resizeTextarea();
      resetInputFocus();
    });

    els.themeToggle.addEventListener("click", () => {
      state.darkMode = !state.darkMode;
      render();
    });

    els.imageBtn.addEventListener("click", () => els.imageInput.click());
    els.audioBtn.addEventListener("click", () => els.audioInput.click());

    els.imageInput.addEventListener("change", (e) => {
      if (e.target.files[0]) {
        state.currentImage = e.target.files[0];
        render();
      }
    });

    els.audioInput.addEventListener("change", (e) => {
      if (e.target.files[0]) {
        state.currentAudio = e.target.files[0];
        render();
      }
    });

    window.addEventListener("load", () => {
      render();
      resizeTextarea();
      resetInputFocus();
    });
  </script>
</body>
</html>
